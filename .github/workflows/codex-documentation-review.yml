name: Codex documentation review

on:
  workflow_dispatch:
  schedule:
    # Run once a week on Monday at 09:00 UTC.
    - cron: "0 9 * * 1"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: codex-documentation-review-${{ github.ref }}
  cancel-in-progress: false

jobs:
  documentation-review:
    name: Review documentation with Codex
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Run Codex documentation review
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .codex/prompts/documentation-review.md
          sandbox: workspace-write
          effort: medium

      - name: Check documentation diff
        run: git diff --check

      - name: Create documentation review pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: codex/documentation-review
          delete-branch: true
          commit-message: "docs: apply Codex documentation review"
          title: "docs: apply Codex documentation review"
          body: |
            ## Summary
            This PR was created by the scheduled Codex documentation review automation.

            Codex reviewed the repository documentation against the current project and made focused documentation updates where it found clear, low-risk improvements.

            ## Codex notes
            ${{ steps.codex.outputs.final-message }}

            ## Checks
            - `git diff --check`

            ## Human review
            Please review the documentation changes for accuracy, tone, and any project-specific context that Codex may not infer from the repository alone.
